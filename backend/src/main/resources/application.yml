spring:
  application:
    name: planilha-reconciliation-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/reconciliation
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyThatMustBeChangedInProduction}
  access-token-expiration: 900000  # 15 min
  refresh-token-expiration: 604800000 # 7 dias
  cookie-name: refresh_token

rate-limiting:
  login:
    capacity: 5
    refill-interval: 60 # segundos

security:
  cors:
    allowed-origins: http://localhost:3000, https://localhost