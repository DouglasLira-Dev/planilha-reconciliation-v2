
### `docker-compose.yml` (base inicial com PostgreSQL e Nginx)
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: reconciliation-postgres
    environment:
      POSTGRES_DB: reconciliation
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reconciliation-network

  nginx:
    image: nginx:alpine
    container_name: reconciliation-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - reconciliation-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reconciliation-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reconciliation
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - reconciliation-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reconciliation-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - reconciliation-network

volumes:
  postgres_data:

networks:
  reconciliation-network:
    driver: bridge